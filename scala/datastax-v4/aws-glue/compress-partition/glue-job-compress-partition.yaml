AWSTemplateFormatVersion: 2010-09-09
Description: 'Create Compress Partition Glue job for Amazon Keyspaces'
Parameters:
  KeyspaceName:
      NoEcho: false
      Description: Cassandra Keyspace name
      Type: String
      MinLength: 3
      MaxLength: 48
  SourceTable:
      NoEcho: false
      Description: Source table to read from
      Type: String
      MinLength: 3
      MaxLength: 48
  TargetTable:
      NoEcho: false
      Description: Target table to write compressed data to
      Type: String
      MinLength: 3
      MaxLength: 48
  Compression:
      NoEcho: false
      Description: Compression algorithm (ZSTD, LZ4, SNAPPY, GZIP)
      Type: String
      Default: "ZSTD"
  WhereClause:
      NoEcho: false
      Description: Optional Paramter. Provide filter criteria (example "my_column=='somevalue' AND my_othercolumn=='someothervalue'")
      Type: String
      Default: ""
  ParentStack:
      NoEcho: false
      Description: Stack used to setup the spark cassandra connector
      Type: String
      Default: aksglue
      MinLength: 3
      MaxLength: 48
Conditions:
    IsWhereClauseEmpty: !Equals
      - !Ref WhereClause
      - ""

Resources:
  GlueJob:
    Type: AWS::Glue::Job
    Properties:
      Command:
        Name: glueetl
        ScriptLocation: !Sub
        - "s3://${IMPORTBUCKETNAME}/scripts/${ParentStack}-compress-partition.scala"
        - IMPORTBUCKETNAME:
            Fn::ImportValue:
              !Sub 'KeyspacesBucketNameExport-${ParentStack}'
      DefaultArguments:
        "--job-language": "scala"
        "--user-jars-first": "true"
        "--extra-jars": !Sub
        - 's3://${IMPORTBUCKETNAME}/jars/spark-cassandra-connector-assembly_2.12-3.1.0.jar,s3://${IMPORTBUCKETNAME}/jars/aws-sigv4-auth-cassandra-java-driver-plugin-4.0.9-shaded.jar,s3://${IMPORTBUCKETNAME}/jars/spark-extension_2.12-2.8.0-3.4.jar,s3://${IMPORTBUCKETNAME}/jars/amazon-keyspaces-helpers-1.0-SNAPSHOT.jar'
        - IMPORTBUCKETNAME:
            Fn::ImportValue:
              !Sub 'KeyspacesBucketNameExport-${ParentStack}'
        "--extra-files": !Sub
        - 's3://${IMPORTBUCKETNAME}/conf/keyspaces-application.conf'
        - IMPORTBUCKETNAME:
            Fn::ImportValue:
              !Sub 'KeyspacesBucketNameExport-${ParentStack}'
        "--enable-metrics": "true"
        "--enable-continuous-cloudwatch-log": "true"
        "--enable-spark-ui": "true"
        "--spark-event-logs-path": !Sub
        - "s3://${IMPORTBUCKETNAME}/spark-logs/"
        - IMPORTBUCKETNAME:
            Fn::ImportValue:
              !Sub 'KeyspacesBucketNameExport-${ParentStack}'
        "--write-shuffle-files-to-s3": "true"
        "--write-shuffle-spills-to-s3": "true"
        "--TempDir": !Sub
        - 's3://${IMPORTBUCKETNAME}/shuffle-space/compress-partition/'
        - IMPORTBUCKETNAME:
            Fn::ImportValue:
              !Sub 'KeyspacesBucketNameExport-${ParentStack}'
        "--KEYSPACE_NAME": !Sub '${KeyspaceName}'
        "--SOURCE_TABLE": !Sub '${SourceTable}'
        "--TARGET_TABLE": !Sub '${TargetTable}'
        "--COMPRESSION": !Sub '${Compression}'
        "--WHERE_CLAUSE": !If
          - IsWhereClauseEmpty
          - !Ref "AWS::NoValue"
          - !Sub '${WhereClause}'
        "--DRIVER_CONF": "keyspaces-application.conf"
        "--class": "GlueApp"
      Description: 'Compress partition data into target table'
      ExecutionProperty:
        MaxConcurrentRuns: 3
      GlueVersion: "3.0"
      Name: !Sub 'AmazonKeyspacesCompressPartition-${ParentStack}'
      NumberOfWorkers: 2
      Role:
        Fn::ImportValue:
            !Sub 'KeyspacesGlueJobServiceRoleExport-${ParentStack}'
      WorkerType: G.2X
