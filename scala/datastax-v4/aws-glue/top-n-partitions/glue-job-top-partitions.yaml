AWSTemplateFormatVersion: 2010-09-09
Description: 'Create Top N Partitions Glue job for Amazon Keyspaces'
Parameters:
  KeyspaceName:
      NoEcho: false
      Description: Cassandra Keyspace name
      Type: String
      MinLength: 3
      MaxLength: 48
  TableName:
      NoEcho: false
      Description: Cassandra Table name
      Type: String
      MinLength: 3
      MaxLength: 48
  GroupBy:
      NoEcho: false
      Description: Comma-separated columns to group by
      Type: String
      Default: "pk"
      MinLength: 1
      MaxLength: 200
  MaxResults:
      NoEcho: false
      Description: Number of top partitions to return
      Type: String
      Default: "10"
  MinSize:
      NoEcho: false
      Description: Minimum partition size to include
      Type: String
      Default: "1"
  WhereClause:
      NoEcho: false
      Description: Optional Paramter. Provide filter criteria (example "my_column=='somevalue' AND my_othercolumn=='someothervalue'")
      Type: String
      Default: ""
  ParentStack:
      NoEcho: false
      Description: Stack used to setup the spark cassandra connector
      Type: String
      Default: aksglue
      MinLength: 3
      MaxLength: 48

Conditions:
    IsWhereClauseEmpty: !Equals
      - !Ref WhereClause
      - ""

Resources:
  GlueJob:
    Type: AWS::Glue::Job
    Properties:
      Command:
        Name: glueetl
        ScriptLocation: !Sub
        - "s3://${IMPORTBUCKETNAME}/scripts/${ParentStack}-${AWS::StackName}-top-partitions.scala"
        - IMPORTBUCKETNAME:
            Fn::ImportValue:
              !Sub 'KeyspacesBucketNameExport-${ParentStack}'
      DefaultArguments:
        "--job-language": "scala"
        "--user-jars-first": "true"
        "--extra-jars": !Sub
        - 's3://${IMPORTBUCKETNAME}/jars/spark-cassandra-connector-assembly_2.12-3.1.0.jar,s3://${IMPORTBUCKETNAME}/jars/aws-sigv4-auth-cassandra-java-driver-plugin-4.0.9-shaded.jar,s3://${IMPORTBUCKETNAME}/jars/spark-extension_2.12-2.8.0-3.4.jar,s3://${IMPORTBUCKETNAME}/jars/amazon-keyspaces-helpers-1.0-SNAPSHOT.jar'
        - IMPORTBUCKETNAME:
            Fn::ImportValue:
              !Sub 'KeyspacesBucketNameExport-${ParentStack}'
        "--extra-files": !Sub
        - 's3://${IMPORTBUCKETNAME}/conf/keyspaces-application.conf'
        - IMPORTBUCKETNAME:
            Fn::ImportValue:
              !Sub 'KeyspacesBucketNameExport-${ParentStack}'
        "--enable-metrics": "true"
        "--enable-continuous-cloudwatch-log": "true"
        "--enable-spark-ui": "true"
        "--spark-event-logs-path": !Sub
        - "s3://${IMPORTBUCKETNAME}/spark-logs/"
        - IMPORTBUCKETNAME:
            Fn::ImportValue:
              !Sub 'KeyspacesBucketNameExport-${ParentStack}'
        "--write-shuffle-files-to-s3": "true"
        "--write-shuffle-spills-to-s3": "true"
        "--TempDir": !Sub
        - 's3://${IMPORTBUCKETNAME}/shuffle-space/top-partitions/'
        - IMPORTBUCKETNAME:
            Fn::ImportValue:
              !Sub 'KeyspacesBucketNameExport-${ParentStack}'
        "--KEYSPACE_NAME": !Sub '${KeyspaceName}'
        "--TABLE_NAME": !Sub '${TableName}'
        "--DRIVER_CONF": "keyspaces-application.conf"
        "--GROUPBY": !Sub '${GroupBy}'
        "--MAX_RESULTS": !Sub '${MaxResults}'
        "--MIN_SIZE": !Sub '${MinSize}'
        "--WHERE_CLAUSE": !If
          - IsWhereClauseEmpty
          - !Ref "AWS::NoValue"
          - !Sub '${WhereClause}'
        "--class": "GlueApp"
      Description: 'Find top N partitions by row count'
      ExecutionProperty:
        MaxConcurrentRuns: 3
      GlueVersion: "3.0"
      Name: !Sub ['AmazonKeyspacesTopPartitions-${STACKNAME}', STACKNAME: !Ref AWS::StackName]
      NumberOfWorkers: 2
      Role:
        Fn::ImportValue:
            !Sub 'KeyspacesGlueJobServiceRoleExport-${ParentStack}'
      WorkerType: G.2X
