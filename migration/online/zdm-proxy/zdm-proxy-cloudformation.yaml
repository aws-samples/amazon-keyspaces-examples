AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for ZDM Proxy Service with ECS Cluster and NLB'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Network Configuration"
        Parameters:
          - VPCId
          - PrivateSubnetIds
          - SecurityGroupId
          - RouteTableId

      - Label:
          default: "Origin Cassandra Configuration"
        Parameters:
          - ZDMOriginContactPoints
          - ZDMOriginUsername
          - ZDMOriginPassword
          - ZDMOriginPort

      - Label:
          default: "Target Keyspaces Configuration"
        Parameters:
          - ZDMTargetUsername
          - ZDMTargetPassword
          - ZDMTargetPort

      - Label:
          default: "ZDM Proxy Configuration"
        Parameters:
          - ServiceReplicaCount
          - ZDMProxyPort
          - ECRImage

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where the ZDM Proxy will be deployed

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of private subnet IDs for the ECS tasks

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group ID for the NLB and ECS tasks

  RouteTableId:
    Type: String
    Description: Route table ID associated with private subnets (for S3 gateway endpoint)

  ZDMOriginContactPoints:
    Type: String
    Description: Comma-separated contact points for the origin Cassandra cluster
    Default: 10.0.1.52

  ZDMOriginPort:
    Type: String
    Description: Port for the origin Cassandra cluster
    Default: '9042'

  ZDMOriginUsername:
    Type: String
    Description: Username for the origin Cassandra cluster
    Default: cassandra

  ZDMOriginPassword:
    Type: String
    Description: Password for the origin Cassandra cluster
    NoEcho: true
    Default: cassandra

  ZDMTargetUsername:
    Type: String
    Description: Keyspaces service-specific credential username
    Default: example-user-at-101

  ZDMTargetPassword:
    Type: String
    Description: Keyspaces service-specific credential password
    NoEcho: true
    Default: example_password=

  ZDMProxyPort:
    Type: String
    Description: Port the ZDM proxy listens on
    Default: '14002'

  ServiceReplicaCount:
    Type: Number
    Description: Number of ZDM Proxy service replicas to run
    Default: 3
    MinValue: 1
    MaxValue: 100

  ECRImage:
    Type: String
    Description: ECR image URI for the custom ZDM proxy image
    Default: ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/zdm-proxy:latest

Resources:
  # --- VPC Endpoints ---
  KeyspacesVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.cassandra'
      VpcId: !Ref VPCId
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      PrivateDnsEnabled: true
      SecurityGroupIds:
        - !Ref SecurityGroupId

  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.api'
      VpcId: !Ref VPCId
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      PrivateDnsEnabled: true
      SecurityGroupIds:
        - !Ref SecurityGroupId

  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.dkr'
      VpcId: !Ref VPCId
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      PrivateDnsEnabled: true
      SecurityGroupIds:
        - !Ref SecurityGroupId

  StsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.sts'
      VpcId: !Ref VPCId
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      PrivateDnsEnabled: true
      SecurityGroupIds:
        - !Ref SecurityGroupId

  CloudWatchLogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.logs'
      VpcId: !Ref VPCId
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      PrivateDnsEnabled: true
      SecurityGroupIds:
        - !Ref SecurityGroupId

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.secretsmanager'
      VpcId: !Ref VPCId
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      PrivateDnsEnabled: true
      SecurityGroupIds:
        - !Ref SecurityGroupId

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcId: !Ref VPCId
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref RouteTableId

  # --- IAM Roles ---
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'secretsmanager:GetSecretValue'
                Resource:
                  - !Ref OriginCredentialsSecret
                  - !Ref TargetCredentialsSecret

  # --- Secrets Manager ---
  OriginCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Origin Cassandra cluster credentials for ZDM Proxy
      SecretString: !Sub '{"username":"${ZDMOriginUsername}","password":"${ZDMOriginPassword}"}'

  TargetCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Target Keyspaces credentials for ZDM Proxy
      SecretString: !Sub '{"username":"${ZDMTargetUsername}","password":"${ZDMTargetPassword}"}'

  # --- CloudWatch Logs ---
  ZDMProxyLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 30

  # --- NLB ---
  NetworkLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Type: network
      Scheme: internal
      SecurityGroups:
        - !Ref SecurityGroupId
      Subnets: !Ref PrivateSubnetIds

  NLBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VPCId
      Port: !Ref ZDMProxyPort
      Protocol: TCP
      TargetType: ip
      HealthCheckProtocol: TCP
      HealthCheckPort: !Ref ZDMProxyPort
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'

  NLBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref NetworkLoadBalancer
      Port: !Ref ZDMProxyPort
      Protocol: TCP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref NLBTargetGroup

  # --- ECS ---
  ECSCluster:
    Type: AWS::ECS::Cluster

  ZDMProxyTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: zdm-proxy
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      Cpu: '1024'
      Memory: '2048'
      ContainerDefinitions:
        - Name: zdm-proxy
          Image: !Ref ECRImage
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ZDMProxyPort
              Protocol: tcp
          HealthCheck:
            Command:
              - CMD-SHELL
              - !Sub 'nc -z localhost ${ZDMProxyPort} || exit 1'
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          Environment:
            - Name: ZDM_ORIGIN_CONTACT_POINTS
              Value: !Ref ZDMOriginContactPoints
            - Name: ZDM_ORIGIN_PORT
              Value: !Ref ZDMOriginPort
            - Name: ZDM_TARGET_CONTACT_POINTS
              Value: localhost
            - Name: ZDM_TARGET_PORT
              Value: '9142'
            - Name: ZDM_TARGET_TLS_ENABLED
              Value: 'false'
            - Name: ZDM_TARGET_ENABLE_HOST_ASSIGNMENT
              Value: 'false'
            - Name: ZDM_FORWARD_CLIENT_CREDENTIALS_TO_ORIGIN
              Value: 'true'
            - Name: ZDM_PROXY_LISTEN_PORT
              Value: !Ref ZDMProxyPort
            - Name: AWS_NLB_DNS
              Value: !GetAtt NetworkLoadBalancer.DNSName
            - Name: AWS_REGION
              Value: !Ref 'AWS::Region'
          Secrets:
            - Name: ZDM_ORIGIN_USERNAME
              ValueFrom: !Sub '${OriginCredentialsSecret}:username::'
            - Name: ZDM_ORIGIN_PASSWORD
              ValueFrom: !Sub '${OriginCredentialsSecret}:password::'
            - Name: ZDM_TARGET_USERNAME
              ValueFrom: !Sub '${TargetCredentialsSecret}:username::'
            - Name: ZDM_TARGET_PASSWORD
              ValueFrom: !Sub '${TargetCredentialsSecret}:password::'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ZDMProxyLogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: ecs

  ZDMProxyService:
    Type: AWS::ECS::Service
    DependsOn: NLBListener
    Properties:
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ZDMProxyTaskDefinition
      DesiredCount: !Ref ServiceReplicaCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref SecurityGroupId
          Subnets: !Ref PrivateSubnetIds
      LoadBalancers:
        - TargetGroupArn: !Ref NLBTargetGroup
          ContainerName: zdm-proxy
          ContainerPort: !Ref ZDMProxyPort

Outputs:
  ECSClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster

  ZDMProxyServiceName:
    Description: ZDM Proxy Service Name
    Value: !GetAtt ZDMProxyService.Name

  NetworkLoadBalancerDNS:
    Description: DNS name of the Network Load Balancer
    Value: !GetAtt NetworkLoadBalancer.DNSName

  ServiceReplicaCount:
    Description: Number of ZDM Proxy service replicas running
    Value: !Ref ServiceReplicaCount
